# Build for dcicsnovault

name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: Test Suite for dcicsnovault

    # The type of runner that the job will run on
    runs-on: ubuntu-22.04

    # Build matrix
    strategy:
      matrix:
        python_version: [3.11]
        test_type: ['UNIT', 'INDEXING']

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install/Link Postgres
        run: |
          sudo apt-get install curl ca-certificates gnupg
          curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install postgresql-11 postgresql-client-11
          echo "/usr/lib/postgresql/11/bin" >> $GITHUB_PATH
          sudo ln -s /usr/lib/postgresql/11/bin/initdb /usr/local/bin/initdb

      - name: Install Deps
        run: |
          make build-for-ga

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@main
        with:
          role-to-assume: arn:aws:iam::643366669028:role/4dn-dcic-github-actions-deployment-role
          role-session-name: snovault-unit-testing-session
          aws-region: us-east-1

      - name: QA (INDEXING)
        if: ${{ matrix.test_type == 'INDEXING' }}
        env:
          S3_ENCRYPT_KEY: ${{ secrets.S3_ENCRYPT_KEY }}
          # # The need for this old environment variable name will go away soon.
          # TRAVIS_JOB_ID: sno-x-test-${{ github.run_number }}-
          # This will be the new environment variable name.
          TEST_JOB_ID: sno-test-indexing-${{ github.run_number }}-${{ matrix.python_version }}-
        run: |
          make remote-test-indexing

      - name: QA (UNIT)
        if: ${{ matrix.test_type == 'UNIT' }}
        env:
          S3_ENCRYPT_KEY: ${{ secrets.S3_ENCRYPT_KEY }}
          # # The need for this old environment variable name will go away soon.
          # TRAVIS_JOB_ID: sno-x-test-${{ github.run_number }}-
          # This will be the new environment variable name.
          TEST_JOB_ID: sno-test-unit-${{ github.run_number }}-${{ matrix.python_version }}-
        run: |
          make remote-test-unit

      - name: Cleanup (INDEXING)
        if: ${{ always() && matrix.test_type == 'INDEXING' }}
        env:
          S3_ENCRYPT_KEY: ${{ secrets.S3_ENCRYPT_KEY }}
          # The need for this old environment variable name will go away soon.
          # TRAVIS_JOB_ID: sno-x-test-${{ github.run_number }}-
          # This will be the new environment variable name.
          TEST_JOB_ID: sno-test-indexing-${{ github.run_number }}-${{ matrix.python_version }}-
        run: |
          poetry run wipe-test-indices $TEST_JOB_ID search-fourfront-testing-opensearch-kqm7pliix4wgiu4druk2indorq.us-east-1.es.amazonaws.com:443
          poetry run wipe-test-indexer-queues $TEST_JOB_ID

      - name: Cleanup (UNIT)
        if: ${{ always() && matrix.test_type == 'UNIT' }}
        env:
          S3_ENCRYPT_KEY: ${{ secrets.S3_ENCRYPT_KEY }}
          # The need for this old environment variable name will go away soon.
          # TRAVIS_JOB_ID: sno-x-test-${{ github.run_number }}-
          # This will be the new environment variable name.
          TEST_JOB_ID: sno-test-unit-${{ github.run_number }}-${{ matrix.python_version }}-
        run: |
          poetry run wipe-test-indices $TEST_JOB_ID search-fourfront-testing-opensearch-kqm7pliix4wgiu4druk2indorq.us-east-1.es.amazonaws.com:443

  # Tags and publishes the version declared in pyproject.toml after a successful test run on
  # master. Runs in the same job as the tag push (rather than relying on main-publish.yml's
  # tag-triggered `on: push: tags` event) because GitHub Actions does not start a new workflow
  # run from a push made with the default GITHUB_TOKEN. The tag-push step is gated on the
  # tag-existence check (only tag once per version). The publish step is independently gated
  # on whether the version exists on PyPI, so it can self-heal if a prior run tagged
  # successfully but crashed before publishing without failing for an already-published version.
  publish:
    name: Tag and Publish to PyPI
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      POETRY_VIRTUALENVS_CREATE: "true"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install Deps
        run: |
          make build-for-ga

      - name: Assert clean release checkout
        run: git diff --exit-code

      - name: Determine version and check for existing tag and PyPI release
        id: version
        run: |
          VERSION=$(poetry version -s)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "refs/tags/$VERSION$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          PYPI_STATUS=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            "https://pypi.org/pypi/dcicsnovault/${VERSION}/json")
          case "$PYPI_STATUS" in
            200) echo "pypi_exists=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "pypi_exists=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected PyPI status ${PYPI_STATUS} for ${VERSION}" >&2; exit 1 ;;
          esac

      - name: Create and push tag
        if: ${{ steps.version.outputs.exists == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Publish to PyPI
        if: ${{ steps.version.outputs.pypi_exists == 'false' }}
        env:
          PYPI_USER: ${{ secrets.PYPI_USER }}
          PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          make publish-for-ga
